services:
  navidrome:
    image: deluan/navidrome:0.63.2
    container_name: navidrome
    user: "1000:1000"
    ports:
      - "127.0.0.1:4533:4533"
    restart: unless-stopped
    environment:
      ND_BASEURL: /music
      ND_LOGLEVEL: info
      ND_SESSIONTIMEOUT: 24h
      ND_SCANSCHEDULE: "@every 15m"
      ND_ENABLEINSIGHTSCOLLECTOR: "false"
    volumes:
      - /home/ubuntu/navidrome/data:/data
      - /home/ubuntu/music:/music:ro
