services:
  navidrome:
    image: deluan/navidrome:0.63.2
    container_name: navidrome-local
    ports:
      - "4533:4533"
    restart: unless-stopped
    environment:
      ND_BASEURL: ""
      ND_LOGLEVEL: info
      ND_SCANSCHEDULE: "@every 1m"
      ND_ENABLEINSIGHTSCOLLECTOR: "false"
    volumes:
      - ./data:/data
      - ./music:/music:ro
